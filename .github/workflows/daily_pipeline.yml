name: Quant Data Pipeline (Full Auto-Sync)

on:
  schedule:
    # 北京时间每天 06:00 = UTC 22:00 (美股收盘后约4小时)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests nltk yfinance fredapi gdeltdoc

    - name: Run Pipeline
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        python auto_daily_pipeline.py

    - name: Commit Updated Data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -f Dynamic_Cleaned_Dataset.csv
        # 只有数据文件真正变化时才 commit
        git diff --staged --quiet || git commit -m "auto: update Dynamic_Cleaned_Dataset.csv [skip ci]"
        git push
